services:
  # Django Backend API Service
  - type: web
    name: masinga-ngcdf-bursary
    env: python
    rootDir: .                       # Backend is in root folder
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    preDeployCommand: python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "masinga-ngcdf-bursary.onrender.com,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://masinga-ngcdf-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://masinga-ngcdf-bursary.onrender.com,https://masinga-ngcdf-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: bursary-db
          property: connectionString

  
databases:
  - name: bursary-db
    plan: free